name: Soak

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  soak:
    name: Cancel/Resume Soak
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Run ignored soak test
        run: cargo test soak_cancel_resume_cycles -- --ignored
